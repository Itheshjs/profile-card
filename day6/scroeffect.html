<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 320px;
            height: 380px;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
        }

        .card img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.05s;
        }
        .card:hover img{
            transform: scale(1.15);
        }
        .info{
            position: absolute;
            bottom: -130px;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px;
            transition: 0.5s;
        }
        .card:hover .info{
            bottom: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://picsum.photos/500/400?random=10">
        <div class="info">
            <h3>Nature Place</h3>
            <p>this card use only hover and transition effect</p>
            <button>read More Info</button>
        </div>
    </div>
</body>
</html>
