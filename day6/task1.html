<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        btn-box{
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .btn{
            padding: 12px 20px;
            border-radius: 20px;
            gap: 20px;
            color: white;
        }
        .one{
            background-color: aqua;
        }
        .one:hover{
            transform: scale(1.5);
            background-color: yellow;
            color: black;
        }

        .two{
            background-color: antiquewhite;
        }
        .two:hover{
            transform: translateY(-10px);
            box-shadow: 0px 0px 30px red;
            color: black;
        }
        .three{
            background-color: rgb(200, 114, 9);
        }
        .three:hover{
            background-color: blue;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="btn-box">
      <button class="btn one">Button 1</button>
      <button class="btn two">Button 2</button>
      <button class="btn three">Button 3</button>
    </div>
  </div>
</body>
</html>
