<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hovering</title>
    <style>
        .con1{
            padding: 10px;
            background-color: rgb(12, 176, 94);
            border-radius: 10px;
            margin: 300px 500px;
            cursor: pointer; 
            text-decoration: none;
        }

        .con1:hover{
            background-color: rgb(13, 123, 123);
            color: white;
            box-shadow: 0px 0px 30px saddlebrown;
            text-decoration:underline ;
        }

        img{
            border: 5px solid black;
            margin-left: 20px;
            box-shadow: 2px 2px 40px rgb(135, 11, 135);
            transition: 0.3sec;
        }
        img:hover{
            border-radius: 50%;
            margin-left: 20px;
             box-shadow: 2px 2px 40px rgb(8, 28, 104);
             transform: scale(2);
        }
    


   </style>
</head>
<body>
    <button class="con1">Hoverme</button>
    <img src="https://wallpaperaccess.com/full/639737.jpg" height="500px" width="500px" >
    
</body>
</html>
