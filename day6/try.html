<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.box{
  width: 200px;
  padding: 20px;
  background: rgb(147, 15, 15);
  transition: 1s;
  color: aliceblue;
  border-radius: 50px;
  text-align: center;
}

.box:hover{
  transform: translateX(20px);
  box-shadow: 0px 0px 50px rgb(6, 6, 109);
  background-color: rgb(7, 68, 152);
  border-radius:50%;
  transform: translateX(500px);
  color: white;
  text-align: center;
  text-shadow: 0px 0px 30px white;
}
</style>
<body>
    <div class="box">Move</div>
</body>
</html>
