<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       .card{
        width: 340px;
        height: 360px;
        position: relative;
        overflow: hidden;
        border-radius: 30px;
       }

       .card img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.5s;
       }

       .card:hover img{
        transform: scale(1.5);
       }

       .info{
        position: absolute;
        width: 100%;
        left: 0;
        bottom: -130px;
        padding: 15px;
        background: white;
        transition: 0.5s;
       }
       .card:hover .info{
        bottom: 0;
       }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://picsum.photos/500/400?random=10">
        <div class="info">
            <h4>Nature</h4>
            <p>No power biger then nature</p>
            <button>Click</button>
        </div>
    </div>
</body>
</html>
