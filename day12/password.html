<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;   
        }
        .bg-video{
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .frame{
            width: 400px;
            height: 500px;
            border: 5px solid rgb(21, 19, 17);
            padding: 20px;
            border-radius: 20px;
            text-align: center;

            background: rgba(255,255,255,0.1);  /* transparent white */
            backdrop-filter: blur(15px);       /* blur effect */
            -webkit-backdrop-filter: blur(15px); /* for Safari */

            box-shadow: 20px 20px 60px rgba(0,0,0,0.4);
        }
        h2{
            color: rgb(58, 5, 108);
            text-shadow: 20cap  rgb(58, 5, 108);
            font-weight: bold;
            font-weight: bold;
            font-style: inherit;
        }

        .video-container{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.video-container iframe{
    width: 100vw;
    height: 100vh;
    pointer-events: none;   /* disables clicking */
}

input{
    padding: 10px;
    border-radius: 20px;
    color: rgb(128, 15, 15);
    border: none;
    margin-top: 30px;
    box-shadow: 40px 40px 400px black;
}
.video-container{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: -1;
}

/* Important part */
.video-container iframe{
    position: absolute;
    top: 50%;
    left: 50%;
    width: 177.77vh;   /* 16:9 ratio trick */
    height: 100vh;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

    </style>
</head>
<body>
    <body>

    <!-- YouTube Background -->
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/G5RpJwCJDqc?autoplay=1&mute=1&controls=0&loop=1&playlist=G5RpJwCJDqc&modestbranding=1&showinfo=0"
            frameborder="0"
            allow="autoplay; fullscreen"
            allowfullscreen height="120vh">
        </iframe>
    </div>

    <!-- Glass Frame -->
    <div class="frame">
        <h2>Password Strength Checker</h2>
        <input type="password" id="password" placeholder="enter the password" onkeyup="cheakPassword()"> 
        <h4 id="message"></h4>
    </div>

    <script>
        function cheakPassword(){
            let pwd=document.getElementById("password").value;
            let message = document.getElementById("message");

            if(pwd.length===0){
                message.innerText="";
            }else if(pwd.length<5){
                message.innerText="Weak password";
                message.style.color="red";
            }else if(pwd.length>=5 && pwd.length<8){
                message.innerText="Medium password";
                message.style.color="orange";
            }else{
                message.innerText="Strong password";
                message.style.color="green";
            }
        }
    </script>

</body>
    
</body>
</html>
