<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote eligible</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg,rgb(160, 58, 183),rgb(46, 205, 170));
        }

        .frame{
            width: 400px;
            height: 500px;
            border: 5px solid rgb(235, 246, 243) ;
            padding: 20px;
            text-align: center;
            padding-top: 30px;
            border-radius: 30px;
            background: linear-gradient(135deg,rgb(143, 5, 5),rgb(199, 15, 206));
            box-shadow: 20px 20px 50px black;

              
        }

        h2{
            background: linear-gradient(135deg,rgb(143, 5, 5),rgb(199, 15, 206));
            font-style: italic;
        }
        #age{
            border-radius: 30px;
        }
        button{
            border-radius: 30px;
            transition: 1.1 ease;
        }

        button:hover{
            transform: translateY(1.1);
        }
        h3{
            color: white;
            font-style: italic;
        }

    </style>
</head>
<body>
    <div class="frame">
        <h2>>Vote eligible</h2>
        <input type="number" id="age" placeholder="enter your age">
        <button onclick="cheakVote()">Cheak</button>
        <h3 id="result"></h3>
    </div>

    <script>
        function cheakVote(){
            let age = document.getElementById("age").value;
            age=Number(age);

            if(age>=18){
                age="your eligible to vote";
                document.getElementById("result").innerHTML="result:"+age;
            }else{
                document.getElementById("result").innerHTML="result:"+age;
            }
           

        }
    </script>
</body>
</html>
