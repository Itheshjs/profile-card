<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position-static</title>
    <style>
        .box1{
            position: static;
            background: red;
        }

        .box2{
            position: relative;
            top: 50px;
            left: 50px;
            background: blue;
        }

        .parent{
            position: relative;
            width: 300px;
            height: 300px;
            background: lightgray;
        }

        .child{
            position: absolute;
            width: 100%;
            height: 100%;
            right: 20px;
            background: green;
        }
        .navbar{
            position: fixed;
            top: 0;
            width: 100%;
            background: black;
        }
    </style>
</head>
<body>
    <div class="navbar"></div>

    <h3>Position-Static</h3>
    <div class="box1">Box1</div>

     
    <h3> position relative</h3>
    <div class="box2">Box2</div>


    <h3> Position :absolute</h3>

    <div class="parent">
        <div class="child">Child</div>
    </div>
    
</body>
</html>
