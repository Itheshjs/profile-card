<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
</head>
<body>
    <h1 style="margin-left: 20px;">Student Registration</h1>
    <form style="border: 5px solid red; padding: 20px;width: 50%;margin-left: 20px; border-radius: 20px;background-color: rgb(139, 158, 169); ">

        <label>Roll no :</label>
        <input type="number" name="Roll no" placeholder="enter your Roll no" style="margin-left: 31px;"><br>

        <label>Full name:</label>
        <input type="text" name="fullname" placeholder="enter your Full name" style="margin-left: 18px;"><br>

        <label>Father name:</label>
        <input type="text" name="Father name" placeholder="enter your Father name"><br>

        <label>Date of birth:</label>
        <input type="datetime" name="Date of birth" placeholder="enter your date of birth"><br>

        <label>Mobile no::</label>
        <input type="number" name="Mobile number" placeholder="enter your Mobile No" style="margin-left: 18px;"><br>




        <label>Email:</label>
        <input type="email"  placeholder="enter your name"><br>

        <label>Password:</label>
        <input type="password" name="password" placeholder="enter your password"><br>


        <label>Age:</label>
        <input type="number" name="age" placeholder="enter yoyr Age"><br>

        <label>location</label>
        <input type="text" name="location" placeholder="enter your location"><br>

        <label>Gender</label>
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">Female

        <br>

        <label>Department</label>
        <input type="checkbox" name="Department" value="CSE">CSE
        <input type="checkbox" name="Department" value="ECE">ECE
        <input type="checkbox" name="Department" value="EEE">EEE
        <input type="checkbox" name="Department" value="MECH">MECH
        <input type="checkbox" name="Department" value="AI">AI
        <br>

        <label>course:</label>
        <select>
            <option>BCA</option>
            <option>BE</option>
            <option>BTECH</option>
            <option>BCS</option>
            <option>Diploma</option>
            <option>M tech
            </option>
        </select> <br>

        <label>City</label>
        <input type="text" name="city" placeholder="enter your city"><br>


        <label>Location</label>
        <input type="text" name="location" placeholder="enter your location"><br>


        <button type="submit" style="background-color: bisque;">Register</button>
        

  
    </form>

    <img src="https://wallpapers.com/images/hd/epic-fantasy-desktop-xo3dkfr1dhevajax.jpg" width="150px" height="150px" style="margin-top: 50px; margin-left: 50px;">
</body>
</html>
