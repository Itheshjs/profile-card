<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Toggle</title>

    <style>
        .frame{
            width: 400px;
            height: 400px;
            border: 2px solid red;
            padding: 20px;
            margin: auto;
            margin-top: 500px;
            border-radius: 20px;
            background: linear-gradient(rgb(10, 73, 156) ,);
        }
        button{
            margin-left: 20px;
            padding: 5px;
            border-radius: 10px;

        }
        input{
            padding: 5px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="frame">
        <h2>Password Toggle</h2>
        <input type="password" id="pass" placeholder="enter your password">
        <button onclick="toggle()">Show/Hide</button>
    </div>

    <script>
        function toggle(){
            let input=document.getElementById("pass");
            if(input.type === "password"){
                input.type="text";
            }else{
                input.type = "password";

            }
        }
    </script>
</body>
</html>
