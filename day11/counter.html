<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        .frame{
            width: 400px;
            height: 400px;
            border: 5px solid rgb(102, 4, 109);
            margin: auto;
            margin-top: 500px;
            padding: 30px;
            text-align: center;
            background: linear-gradient(155deg, rgb(98, 5, 34),rgb(247, 4, 13));
            border-radius: 20px;
            padding-top: 30px;
        }

        h2{
            color: white;
        }

        h1{
            color: white;
        }
    </style>

</head>
<body>
    <div class="frame">
        <div class="frame2">
            <h2>counter</h2>
            <h1 id="count">👉0</h1>
            <button 👉 onclick="increase()">+</button>
            <button 👉 onclick="decrese()">-</button>
            <button onclick="reset()">Reset</button>
        </div>
    </div>

    <script>
        let count=0;
        function increase(){
            count++;

            document.getElementById("count").innerHTML=count;
        }

        function decrese(){
            if(count>0){
            count--;

            document.getElementById("count").innerHTML=count;
            }
        }

        function reset(){
            count=0;

            document.getElementById("count").innerHTML=count;

        }
    </script>
</body>
</html>
