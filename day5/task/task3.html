<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combined Page</title>

    <style>
        /* Reset */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* First Section */
        #sel{
            background-color: blue;
            width: 300px;
            padding: 20px;
            color: white;
            margin: 20px;
        }

        /* Second Section */
        .heading{
            color: red;
        }

        h1, h2, h3{
            font-family: Georgia, 'Times New Roman', Times, serif;
            margin: 10px 20px;
        }

        /* Third Section */
        .third-section{
            margin: 20px;
        }

        .third-section p{
            color: blue;
            font-size: 20px;
            margin-bottom: 15px;
        }

        button{
            background-color: green;
            color: white;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
        }

        button:hover{
            background-color: gray;
        }
    </style>
</head>

<body>

    <!-- First Part -->
    <div id="sel">
        <h1>Welcome to Portal</h1>
        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Veritatis quam architecto nostrum delectus eum.
        </p>
    </div>

    <!-- Second Part -->
    <h1 class="heading">Government</h1>
    <h2 class="heading">Engineering</h2>
    <h3 class="heading">College</h3>

    <!-- Third Part -->
    <div class="third-section">
        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
            Ducimus esse eos ipsa ullam.
        </p>
        <button>Submit</button>
    </div>

</body>
</html>
