<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student card</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(198, 227, 245);

        }
        .card{
            width: 300px;
            margin: 30px auto;
            border-radius: 50px;
            box-shadow: 0px 0px 70px rgb(122, 3, 130);
            background-color: lightcyan  ;
            padding:30px;
            background-image: url(https://wallpaperaccess.com/full/630878.jpg) ;
            margin-top: 30px;
        
        }
        h1{
            color: rgb(43, 4, 80);
            text-align: center;
            font-weight: bold;
            box-shadow: 0px 0px 20px rgb(43, 4, 80) ;
        }

        .name{
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: white;
        }
        .course{
            font-size: 20px;
            text-align: center; 
            color: white;
        }
        .coll{
            text-align: center;
            font-size: 20px;
            color: white;
        }
        .pin{
            text-align: center;
            font-size: 20px;
            color: white;
        }
        .add{
            text-align: center;
            font-size: 20px;
            color: white;
        }
        .UN{
            text-align: center;
            font-size: 20px;
            color: white;
        }

    </style>
</head>
<body>

    <div class="card">
        <h1>Student card</h1>
        <p class="name">Ithesh js</p>
        <p class="course">Django Full stack</p>
        <p class="coll">College:GECM</p>
        <p class="pin">PIN:577212</p>
        <p class="add">location:GECM mosalehosahalli</p>
        <p class="UN">University:VTU</p>
    </div>

</body>
</html>
