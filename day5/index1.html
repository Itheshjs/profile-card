<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            background-color: lightskyblue;
        }
        .info{
            background-color: rgb(223, 234, 183);
            padding: 20px;
            border: 5px solid black;
            width: 300px;
            margin: 50px;
            font-family: Arial, Helvetica, sans-serif;
            border-radius: 50%;
            text-align: center;
            margin: auto;
            margin-top: 100px;
            transition:0.8 ease-in-out ;
        }
        .info:hover{
            transform: rotate(-90deg);
            background-color: rgb(53, 186, 223);
            color: black;
            text-align: center;
            border: 10px solid black;

        }
        h2{
            color: rgb(84, 84, 189);
        }
        p{
            color: rgb(20, 70, 131);
            font-style: italic;
        }
       img{
            padding: 20px;
            width: 400px;
            margin: 50px;
            border-radius: 50%;
            margin: auto;
            margin-top: 100px;
            background-color: transparent;
            border: 5px solid black;

       }
    </style>
</head>
<body>
    <div class="img2">
            <div class="info">
                <img src="download.jpeg">
                <h2>GPU</h2>
                <p>Graphical processing Unit this is much fast then CPU .</p>
            </div>
    </div>
    
</body>
</html>
