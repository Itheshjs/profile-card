<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(135deg,rgb(139, 10, 133),rgba(20, 207, 173, 0.806));
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeSlideUp{
            from{
                opacity: 0; 
                transform: translateY(40px);              
            }
            to{
                opacity: 1;
                transform:translateY(0) ;
            }  
        }


        @keyframes float{
            0%,100%{
                transform: translateY(0px);
            }
            50%{
                transform: translateY(-8px);
            }

        }

        .card{
            background: linear-gradient(135deg,rgba(20, 207, 173, 0.806),rgb(139, 10, 133));
            border-radius: 20px;
            border: 3px solid black;
            box-shadow: 30px 30px 40px black;
            padding: 30px;
            width: 500px;
            height: 600px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeSlideUp 0.8s ease forwards, float 4s ease-in-out infinite;
            transition: all 0.4s ease;
               
        }

        .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 22px;
        background: linear-gradient(45deg, #2563eb, #3b82f6, #1e40af);
        z-index: -1;
        filter: blur(15px);
        opacity: 0;
        transition: opacity 0.4s ease;
    }

    .card:hover::before {
        opacity: 0.6;
    }

    .card:hover {
        transform: scale(1.03);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
    }

    .card img{
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 50%;
        transition: 1.5 ease;
        border: 4px solid black;
        margin-bottom: 15px;
    }

    .card img:hover{
        transform: scale(1.5);
    }

    h2 {
    margin: 10px 0 5px;
    font-weight: bold;
    color:black;
}

h4 {
    margin:20px 0;
    color: white;
    font-weight: 500;
}

p {
    font-size: 20px;
    color: #031035;
    line-height: 1.6;
    margin: 30px 0;
}

.skills{
    margin: 25px 0;
}
.skills span {
    display: inline-block;
    background: #e0e7ff;
    color: #1e3a8a;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    margin: 3px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.skills span:hover{
    transform: translateY(-5px) scale(1.1);
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
}

.btn{
    margin-top: 60px;
}

.btncv{
    margin-right: 20px;
    padding: 5px;
    border-radius: 10px;
    color: #1e3a8a;
    
}
.btncv:hover{
    transform: translateY(-5px) scale(1.1);
    box-shadow: 0px 0px 40px rgb(23, 156, 85);
    background-color: lemonchiffon;
}

.buttoncontact{
    padding: 5px;
    border-radius: 10px;
    width: 100px;
    color: #1e3a8a;
}

.buttoncontact:hover{
    transform: translateY(-5px) scale(1.1);
    background-color: antiquewhite;
}


    </style>
</head>
<body>
    <div class="card">
        <img src="WhatsApp Image 2026-02-18 at 10.16.16 AM.jpeg" alt="Ithesh js">
        <h2>Ithesh js </h2>
        <h4>Computer Science and Engineering</h4>
        <p>I am computer science and engineering student from the Governmemnt engineering college Mosale hosahalli learning new technology always fascinate me.I aspired to buikld new tech to solve day to day problem</p>
        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JS</span>
            <span>Django</span><br>
            <span>MongoDB</span>
            <span>Cyber Security</span>
        </div>

        <div class="btn">
            <button class="btncv">Download cv</button>
            <button class="buttoncontact" id="contactBtn">Contact</button>
        </div>

    </div>

    <script>
        let contactBTN = document.getElementById("contactBtn");
            contactBTN.addEventListener("click",function(){
                alert("Contact me on mail: jayanthpjayanthp055@gmail.com");
            })
        


    </script>
    
</body>
</html>
